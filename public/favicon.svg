    C 17.8432 17.8432, 17.8432 17.8432, 16 26.240000000000002
    C 14.1568 17.8432, 14.1568 17.8432, 5.76 16
    C 14.1568 14.1568, 14.1568 14.1568, 16 5.76
    Z" fill="white" opacity="0.18" filter="url(#blur)"
    transform="scale(1.15) translate(-2.4 -2.4)"/>

  <!-- Main star -->
  <path d="M 16 5.76
    C 17.8432 14.1568, 17.8432 14.1568, 26.240000000000002 16
    C 17.8432 17.8432, 17.8432 17.8432, 16 26.240000000000002
    C 14.1568 17.8432, 14.1568 17.8432, 5.76 16
    C 14.1568 14.1568, 14.1568 14.1568, 16 5.76
    Z" fill="white" opacity="0.95"/>

  <!-- Centre dot -->
